<!DOCTYPE html>
<html>
<head>
<title>StreeSecure - Digital Streedhan Registry</title>

<style>
body{
font-family: Arial;
background:#f8f4f0;
margin:0;
padding:0;
}

header{
background:#8b1c3d;
color:white;
padding:20px;
text-align:center;
}

.container{
width:80%;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, button{
padding:10px;
margin:5px;
}

button{
background:#8b1c3d;
color:white;
border:none;
cursor:pointer;
}

.asset{
border-bottom:1px solid #ddd;
padding:10px;
}
</style>

</head>

<body>

<header>
<h1>StreeSecure</h1>
<p>Digitizing Women's Wedding Assets</p>
</header>

<div class="container">

<div class="card">

<h2>Register Wedding</h2>

<input id="bride" placeholder="Bride Name">

<input id="date" type="date">

<button onclick="registerWedding()">Register</button>

<p id="weddingStatus"></p>

</div>


<div class="card">

<h2>Add Streedhan Asset</h2>

<input id="assetName" placeholder="Jewellery Name">

<input id="value" placeholder="Estimated Value ₹">

<input id="giver" placeholder="Gifted By">

<input type="file" id="image">

<button onclick="addAsset()">Add Asset</button>

</div>


<div class="card">

<h2>Digital Streedhan Vault</h2>

<div id="vault"></div>

</div>


<div class="card">

<h2>Generate Streedhan Certificate</h2>

<button onclick="generateCertificate()">Generate Certificate</button>

<p id="certificate"></p>

</div>

</div>

<script>

let assets=[]

function registerWedding(){

let bride=document.getElementById("bride").value
let date=document.getElementById("date").value

document.getElementById("weddingStatus").innerHTML=
"Wedding registered for "+bride+" on "+date

}

function addAsset(){

let name=document.getElementById("assetName").value
let value=document.getElementById("value").value
let giver=document.getElementById("giver").value

let asset={
name:name,
value:value,
giver:giver
}

assets.push(asset)

displayVault()

}

function displayVault(){

let vault=document.getElementById("vault")

vault.innerHTML=""

assets.forEach((a)=>{

vault.innerHTML+=
`<div class="asset">
<b>${a.name}</b><br>
Value: ₹${a.value}<br>
Gifted by: ${a.giver}
</div>`

})

}

function generateCertificate(){

let total=assets.reduce((sum,a)=>sum+Number(a.value),0)

document.getElementById("certificate").innerHTML=
"Digital Streedhan Certificate Generated. Total Registered Assets: ₹"+total

}

</script>

</body>
</html>
